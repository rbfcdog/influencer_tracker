services:
  postgres:
    image: postgres:16
    container_name: influencer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: influencer
      POSTGRES_PASSWORD: influencer
      POSTGRES_DB: influencer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U influencer -d influencer"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
